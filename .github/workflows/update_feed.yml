name: Обновить YML-фид для 2ГИС

on:
  schedule:
    - cron: "0 * * * *"   # каждый час
  workflow_dispatch:        # запуск вручную из GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install requests

      - name: Сгенерировать фид
        env:
          MOYSKLAD_TOKEN: ${{ secrets.MOYSKLAD_TOKEN }}
          OUTPUT_FILE: "public/feed.xml"
        run: |
          mkdir -p public
          python generate_feed.py

      - name: Опубликовать в gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
          commit_message: "Обновление фида ${{ github.run_id }}"
